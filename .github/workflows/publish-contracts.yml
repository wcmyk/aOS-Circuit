name: Publish @wcmyk/library-contracts

on:
  push:
    branches: [main]
    paths:
      - 'packages/aos-library-contracts/**'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@wcmyk'

      - name: Install and build
        working-directory: packages/aos-library-contracts
        run: npm install && npm run build

      - name: Publish
        working-directory: packages/aos-library-contracts
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
